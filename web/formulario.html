<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Formulario</title>
</head>

<body>
    <div class="naveg">
        <a class="brand" href="index.html">
            <img src="../img/logo_trans_negro.png" alt="Logo Proyecto Intermodular">
            <span>Proyecto Intermodular</span>
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="main-menu"
            aria-label="Abrir menu de navegacion">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="main-menu" class="menu">
            <a href="index.html">Inicio</a>
            <a href="about.html">Sobre nosotros</a>
            <a href="contacto.html">Contacto</a>
            <a href="formulario.html">Formulario</a>
        </nav>
    </div>

    <form action="formulario.html">
        <div class="formulario">
            <h2>Formulario de contacto</h2>
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <br>
            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <br>
            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
            </div>
            <br>
            <div class="campo">
                <button type="submit">Enviar</button>
            </div>
        </div>
    </form>

    <div class="footer">
        <p>&copy; 2026 Proyecto Intermodular</p>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
