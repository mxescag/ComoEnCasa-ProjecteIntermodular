    <!-- CONTENIDO DE CONTACTO -->

    <main>

        <h2>Contacto</h2>

        <div class="contacto">

            <!-- INFORMACIÓN -->

            <div class="info-contacto">

                <h3>Información de contacto</h3>

                <p>Dirección: Calle Principal 25, Bellreguard</p>

                <p>Teléfono: 600 123 456</p>

                <p>
                    Correo:
                    <a href="mailto:comoencasa@gmail.com">
                        comoencasa@gmail.com
                    </a>
                </p>

            </div>

            <!-- MAPA -->

            <div class="mapa">

                <h3>Localización</h3>

                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d10488.414021903145!2d-0.17400990018800527!3d38.94934543518828!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd61e863da5ac3f5%3A0x3dd722d9e342a281!2sBellreguart%2C%20Valencia!5e1!3m2!1ses!2ses!4v1778154432736!5m2!1ses!2ses"
                 width="600" 
                 height="450" 
                 style="border:0;"
                  allowfullscreen="" 
                  loading="lazy" 
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>

               
            </div>

        </div>

        <!-- FORMULARIO -->

        <div class="formulario-contacto">

            <h3>Envíanos un mensaje</h3>

            <form action="#" method="get">

                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <br><br>

                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" required>

                <br><br>

                <label for="mensaje">Mensaje:</label>

                <br>

                <textarea id="mensaje" name="mensaje" rows="5" cols="40" required></textarea>

                <br><br>

                <button type="submit">Enviar</button>

            </form>

        </div>

    </main>
